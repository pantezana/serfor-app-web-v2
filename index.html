    <script>
      let eventosCargados = [];
      let mediaRecorder;
      let finalizandoGrabacion = false; // Nos dirá si pulsamos "Detener" o solo "Pausa"      
      let audioChunks = [];
      let timerInterval;
      let idEventoActivo = "";
      let origenActual = "Manual"; // Por defecto es manual
      let recognition;
      let estaGrabando = false;
      let eventoCerradoGlobal = false;
      let segundos = 0;
      let tInterval;
      let localStream; // Nueva variable global para "sujetar" el micrófono
      let intervaloAutoGuardado; // El "reloj" que contará los 15 minutos
      let listaProyectosGlobal = [];
      const TIEMPO_FRAGMENTO = 10 * 60 * 1000; // 5 minutos convertidos a milisegundos
      let segundosPendientesPausa = null; // Para saber si el stop actual es una pausa
      
      let URL_WEB_APP = ""; // Se llenará dinámicamente tras el login

      let USUARIO_EMAIL = ""; // Se captura el correo desde el login

      const URL_BACKEND = "TU_URL_DE_DESPLIEGUE_AQUÍ"; // La obtendrás al publicar

async function llamarBackend(accion, datos = {}) {
  const payload = {
    accion: accion,
    ...datos
  };

  const response = await fetch(URL_BACKEND, {
    method: 'POST',
    mode: 'no-cors', // Importante para evitar bloqueos de navegador
    body: JSON.stringify(payload)
  });
  
  // Nota: Con 'no-cors' no podemos leer la respuesta directamente de forma fácil, 
  // pero para subir audio y enviar datos es suficiente. 
  // Si necesitas leer datos (como la lista de eventos), usaremos un túnel proxy o CORS habilitado.
}

    


async function cargarDatos() {
  // Validación de seguridad
    if (!URL_WEB_APP) {
        console.warn("Intento de carga sin URL de Backend definida.");
        return;
    }
  
  const btn = document.querySelector('.btn-refresh');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '⏳ Sincronizando...';
  }
  document.getElementById('calendar-grid').innerHTML = '<p class="msg">Conectando con SERFOR...</p>';

  // CONSTRUIMOS LA URL CON EL PARÁMETRO
  const urlFinal = URL_WEB_APP + "?accion=obtenerEventos&email=" + USUARIO_EMAIL;
  
  try {
    // IMPORTANTE: Al ser GET no hay errores de CORS en Apps Script
    const respuesta = await fetch(urlFinal);
    const eventos = await respuesta.json();

    if (btn) {
      btn.disabled = false;
      btn.innerHTML = '🔄 Sincronizar';
    }

    // Dibujamos los cuadritos de los eventos
    procesarEventos(eventos);

  } catch (error) {
    console.error("Error de conexión:", error);
    document.getElementById('calendar-grid').innerHTML = 
      '<p class="msg" style="color:red;">Error al cargar datos. Refresque la página.</p>';
  }
}
      
      function procesarEventos(eventos) {
        eventosCargados = eventos;
        renderizarCalendario(eventos);
      }
      
      // ... (cargarDatos y procesarEventos se mantienen igual)

      function renderizarCalendario(eventos) {
      const contenedor = document.getElementById('calendar-grid');
      if (!eventos || eventos.length === 0) {
        contenedor.innerHTML = '<div style="grid-column: span 7; padding: 50px; text-align: center;">✅ Sin eventos pendientes.</div>';
        return;
      }

      const eventosPorFecha = {};
      eventos.forEach(ev => {
        const fechaKey = ev.fecha.split(' ')[0];
        if (!eventosPorFecha[fechaKey]) eventosPorFecha[fechaKey] = [];
        eventosPorFecha[fechaKey].push(ev);
      });

      const fechasOrdenadas = Object.keys(eventosPorFecha).sort((a, b) => parseDate(a) - parseDate(b));
      const fechaInicio = parseDate(fechasOrdenadas[0]);
      const fechaFin = parseDate(fechasOrdenadas[fechasOrdenadas.length - 1]);

      let fechaActual = new Date(fechaInicio);
      fechaActual.setDate(fechaActual.getDate() - fechaActual.getDay());

      let html = '';
      const diasSemana = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
      diasSemana.forEach(dia => html += `<div class="calendar-header">${dia}</div>`);

  while (fechaActual <= fechaFin || fechaActual.getDay() !== 0) {
    const diaStr = formatDate(fechaActual);
    const esHoy = new Date().toDateString() === fechaActual.toDateString();
    const eventosDelDia = eventosPorFecha[diaStr] || [];

    html += `
      <div class="calendar-day ${esHoy ? 'hoy' : ''}">
        <span class="numero-dia">${fechaActual.getDate()} / ${fechaActual.getMonth() + 1}</span>
        <div class="event-list">
          ${eventosDelDia.map(ev => `
            <div class="mini-card" data-titulo="${ev.titulo.toLowerCase()}">
              <div class="hora-mini">${ev.fecha.split(' ')[1]}</div>
              <div class="titulo-mini">${ev.titulo}</div>
              
              <div class="estado-container">
                <label style="font-size:10px;">Estado:</label>
                <select id="estado-${ev.id}" onchange="actualizarEstado('${ev.id}')" 
                        style="background: ${ev.estado === 'Abierto' ? '#e6f4ea' : '#fce8e6'}; border-radius:4px; border:1px solid #ccc;">
                  <option value="Cerrado" ${ev.estado !== 'Abierto' ? 'selected' : ''}>🔴 Cerrado</option>
                  <option value="Abierto" ${ev.estado === 'Abierto' ? 'selected' : ''}>🟢 Abierto</option>
                </select>
              </div>

              <select id="select-${ev.id}">
                <option value="">Proyecto...</option>
                ${ev.proyectos.map(p => `<option value="${p}" ${ev.proyectoElegido === p ? 'selected' : ''}>${p}</option>`).join('')}
              </select>                    
              
              <div class="nav-btns-mini">         
                <button class="btn-mini-save" onclick="guardarProyecto(event, '${ev.id}')" title="Guardar Proyecto">💾 Guardar Proyecto</button>
                <button class="btn-qr" onclick="verQR('${ev.id}', '${ev.titulo}')" title="Generar QR">📱 QR Asistencia</button>
                <button class="btn-copy-link" onclick="copiarEnlaceAsistencia('${ev.id}')" title="Copiar Enlace">🔗 Enlace Asistencia</button>    
                <button class="btn-pdf-asist" onclick="descargarPDFAsistencia('${ev.id}', '${ev.titulo}')" title="Descargar Lista de Asistencia">📄 Lista Asistencia</button>
                <button class="btn-mic" onclick="abrirGrabador('${ev.id}', '${ev.titulo}')" title="Grabar Evento">🎙️ Grabar Reunión</button>             
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    fechaActual.setDate(fechaActual.getDate() + 1);
  }
  contenedor.innerHTML = html;
}

  // ... (el resto de funciones: parseDate, formatDate, filtrarEventos, guardarProyecto se mantienen igual)

      function parseDate(str) {
        const d = str.split('/');
        return new Date(d[2], d[1]-1, d[0]);
      }

      function formatDate(date) {
        return `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}/${date.getFullYear()}`;
      }

      function filtrarEventos() {
        const busqueda = document.getElementById('buscador').value.toLowerCase();
        document.querySelectorAll('.mini-card').forEach(card => {
          const match = card.getAttribute('data-titulo').includes(busqueda);
          card.style.display = match ? 'block' : 'none';
          card.style.border = match && busqueda !== "" ? '2px solid #1a73e8' : 'none';
        });
      }

      function guardarProyecto(e, idEvento) {
        e.stopPropagation();
        const proyecto = document.getElementById('select-' + idEvento).value;
        if (!proyecto) return alert('Selecciona un proyecto');
        
        google.script.run.withSuccessHandler(() => {
          cargarDatos();
        }).asignarProyectoAEvento(idEvento, proyecto);
      }

      function verQR(id, titulo) {
  // 1. Generamos la URL de asistencia usando nuestra constante
  const urlAsistencia = URL_WEB_APP + "?id=" + id;
 
  // 2. Generamos el QR con el servicio externo
  const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(urlAsistencia);
 
  // 3. Abrimos la ventana emergente
  const win = window.open("", "QR", "width=400,height=500");
 
  win.document.write(`
    <div style="text-align:center; font-family:sans-serif; padding:20px;">
      <h3>QR de Asistencia</h3>
      <p><strong>Evento:</strong> ${titulo}</p>
      <img src="${qrUrl}" style="border:10px solid white; box-shadow:0 0 10px rgba(0,0,0,0.2); width:250px;">
      <p style="font-size:12px; color:gray;">Escanee para registrarse</p>
      <div style="margin-top:15px;">
        <button onclick="window.print()" style="padding:10px; cursor:pointer; background:#4CAF50; color:white; border:none; border-radius:4px;">Imprimir QR</button>
        <button onclick="window.close()" style="padding:10px; cursor:pointer; background:#f44336; color:white; border:none; border-radius:4px;">Cerrar</button>
      </div>
    </div>
  `);
  win.document.close(); // Buena práctica cerrar el stream del documento
}

      async function actualizarEstado(idEvento) {
  const selector = document.getElementById('estado-' + idEvento);
  const nuevoEstado = selector.value;
 
  // Bloqueamos el selector momentáneamente para evitar doble clic
  selector.disabled = true;

  try {
    const respuesta = await fetch(URL_WEB_APP, {
      method: 'POST',
      body: JSON.stringify({
        accion: 'cambiarEstadoEvento',
        idEvento: idEvento,
        nuevoEstado: nuevoEstado
      })
    });

    const res = await respuesta.json();
    console.log("Respuesta de cambio de estado:", res);

    // Refrescamos la agenda para que los colores se actualicen
    await cargarDatos();

  } catch (error) {
    console.error("Error al actualizar estado:", error);
    alert("No se pudo actualizar el estado. Verifica tu conexión.");
  } finally {
    selector.disabled = false;
  }
}

 async function abrirGrabador(id, titulo) {
  idEventoActivo = id;
  
  // Limpieza previa
  document.getElementById('texto-transcripcion').value = "Cargando datos desde Google...";
  document.getElementById('texto-resumen').value = "";
  document.getElementById('modal-titulo').innerText = "Acta: " + titulo;
  document.getElementById('modal-acta').style.display = 'block';

  // --- CAMBIO CLAVE: Usamos fetch en lugar de google.script.run ---
  try {
    const urlFinal = URL_WEB_APP + "?accion=obtenerDatosActa&id=" + id;
    const respuesta = await fetch(urlFinal);
    const data = await respuesta.json();

    // Rellenamos los campos con lo que devolvió Google
    document.getElementById('texto-transcripcion').value = data.transcripcion || "";
    document.getElementById('texto-resumen').value = data.resumen || "";

    // Recuperar el tiempo del cronómetro
    segundos = data.segundosAcumulados || 0; 
    document.getElementById('cronometro').innerText = formatearTiempo(segundos);
    
    // Aplicar bloqueos si el acta está cerrada
    bloquearEdicion(data.estado); 

  } catch (error) {
    console.error("Error al obtener datos del acta:", error);
    document.getElementById('texto-transcripcion').value = "Error al conectar con el servidor.";
  }
}
      
    function cerrarModalActa() {
      if(estaGrabando) {
        alert("Por favor, detén o pausa la grabación antes de cerrar.");
        return;
      }
      
      // --- NUEVA MEJORA SEGURIDAD ---
      // Detenemos el temporizador de auto-guardado para que no interfiera con otros eventos
      clearInterval(intervaloAutoGuardado); 
      
      // Reseteamos variables de control para que el próximo modal empiece de cero
      finalizandoGrabacion = false; 
      segundos = 0;
      audioChunks = []; // Limpiamos cualquier residuo de memoria
      
      document.getElementById('modal-acta').style.display = 'none';
      document.getElementById('cronometro').innerText = "00:00";
      
      // Limpiar los campos de texto para que no se vea el texto anterior un segundo
      document.getElementById('texto-transcripcion').value = "";
      document.getElementById('texto-resumen').value = "";
    }

    function iniciarGrabacion() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert("Tu navegador no soporta la grabación de audio o requiere una conexión segura (HTTPS).");
        return;
      }

      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.start();
          audioChunks = [];

          mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
          
          // Cambios en la interfaz (UI)
          document.getElementById('btn-start').style.display = 'none';
          document.getElementById('btn-stop').style.display = 'inline-block';
          
          // Cronómetro
          let segundos = 0;
          if (timerInterval) clearInterval(timerInterval); // Limpiar si había uno previo
          timerInterval = setInterval(() => {
            segundos++;
            let m = Math.floor(segundos / 60);
            let s = segundos % 60;
            document.getElementById('cronometro').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
          }, 1000);
        })
        .catch(err => {
          console.error("Error detallado:", err);
          // Mensajes específicos para el usuario en el celular
          if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
            alert("⚠️ Acceso denegado: Por favor, activa el permiso de micrófono en la configuración de tu navegador (clic en el candado de la URL).");
          } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
            alert("❌ No se detectó un micrófono disponible en este dispositivo.");
          } else {
            alert("🚨 Error al acceder al micrófono: Asegúrate de estar usando HTTPS y de no tener otra aplicación usando el micro.");
          }
        });
    }

    function detenerGrabacion() {
      mediaRecorder.stop();
      clearInterval(timerInterval);
      document.getElementById('btn-stop').innerText = "⌛ Subiendo audio...";
      document.getElementById('btn-stop').disabled = true;

      mediaRecorder.onstop = () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.readAsDataURL(audioBlob);
        reader.onloadend = () => {
          const base64data = reader.result.split(',')[1];
          
          google.script.run
            .withFailureHandler(err => {
              alert("Error al subir: " + err);
              document.getElementById('btn-stop').innerText = "❌ Falló";
              document.getElementById('btn-stop').disabled = false;
            })
            .withSuccessHandler(resDrive => {
              if (resDrive.success) {
                document.getElementById('btn-stop').innerText = "🧠 IA Procesando...";
                
                google.script.run
                  .withFailureHandler(err => {
                    alert("Error en IA: " + err);
                    document.getElementById('btn-stop').innerText = "❌ Error IA";
                    document.getElementById('btn-stop').disabled = false;
                  })
                  .withSuccessHandler(resIA => {
                    if (resIA.status === "success") {
                      document.getElementById('btn-stop').innerText = "✅ Listo";
                      origenActual = "Grabación"; // <-- IMPORTANTE: activamos el origen
                      document.getElementById('texto-resumen').value =

  // MOMENTO 2: Transcrita o Resumida
  else if (estado === "Transcrita" || estado === "Resumida") {

    btnStart.disabled = true;

// Función auxiliar para una mejor experiencia de usuario
function fallbackCopiarEnlace(texto) {
  const textArea = document.createElement("textarea");
  textArea.value = texto;
  // Aseguramos que no se vea en pantalla mientras se procesa
  textArea.style.position = "fixed";
  textArea.style.left = "-9999px";
  textArea.style.top = "0";
  document.body.appendChild(textArea);
  textArea.focus();
  textArea.select();
 
  try {
    const exitoso = document.execCommand('copy');
    if (exitoso) {
      alert("✅ Enlace de asistencia copiado al portapapeles.");
    }
  } catch (err) {
    console.error('Fallback falló:', err);
    alert("❌ No se pudo copiar. URL: " + texto);
  }
  document.body.removeChild(textArea);
}

    proyecto: document.getElementById('nuevo-proyecto').value,
    fecha: document.getElementById('nueva-fecha').value,
    hora: document.getElementById('nueva-hora').value,
    horaFin: document.getElementById('nueva-hora-fin').value,
    // --- AJUSTE AQUÍ ---
    email: USUARIO_EMAIL // Enviamos el email capturado en el login
  };

  // 1. Validación de campos vacíos
  if (!datos.titulo || !datos.proyecto || !datos.fecha || !datos.hora || !datos.horaFin) {
    alert("⚠️ Atención: Todos los campos son obligatorios para crear el evento.");
    return;
  }

  // 2. Feedback visual de procesamiento
  const grid = document.getElementById('calendar-grid');
  const backupGrid = grid.innerHTML;
  grid.innerHTML = '<div style="text-align:center; padding:20px;">🚀 Procesando con Google Calendar... Por favor espera.</div>';

  cerrarModalCrear();

  try {
    // 3. Envío de datos mediante fetch al doPost de Google
    const respuesta = await fetch(URL_WEB_APP, {
      method: 'POST',
      body: JSON.stringify({
        accion: 'crearEventoEmergencia',
        datos: datos // Enviamos el objeto completo de datos
      })
    });

    const res = await respuesta.json();

    if (res.status === "success") {
      alert("✅ ¡Excelente! El evento ha sido creado en Calendar y registrado en la base de datos.");
      // Sincroniza y refresca la vista llamando a tu función de carga
      if (typeof cargarDatos === 'function') await cargarDatos();
    } else {
      alert("❌ No se pudo crear el evento.\n\nMotivo: " + res.message);
      grid.innerHTML = backupGrid; // Restauramos la vista si falla el servidor
    }

  } catch (error) {
    console.error("Error crítico al crear evento:", error);
    alert("🛑 Error de conexión: No se pudo contactar con el servidor. Revisa tu internet.");
    grid.innerHTML = backupGrid;
  }
}

// Esta es la pieza que falta para convertir números en formato de reloj
function formatearTiempo(segundosTotales) {
  const min = Math.floor(segundosTotales / 60);
  const seg = segundosTotales % 60;
  // Agregamos un cero a la izquierda si el número es menor a 10
  const minStr = min < 10 ? "0" + min : min;
  const segStr = seg < 10 ? "0" + seg : seg;
  return minStr + ":" + segStr;
}

async function descargarPDFAsistencia(idEvento, tituloEvento) {
  // Feedback visual (capturamos el botón desde el evento)
  const btn = event.target;
  const originalText = btn.innerText;
  btn.innerText = "⏳ Generando...";
  btn.disabled = true;

  try {
    // LLAMADA COMPATIBLE CON GITHUB
    const respuesta = await fetch(URL_WEB_APP, {
      method: 'POST',
      body: JSON.stringify({
        accion: 'obtenerDatosAsistenciaPDF',
        idEvento: idEvento
      })
    });

    const res = await respuesta.json();
    btn.innerText = originalText;
    btn.disabled = false;

    if (!res.success || !res.lista || res.lista.length === 0) {
      alert("No se encontraron asistentes registrados para este evento.");
      return;
    }

    // --- INICIO LÓGICA JSPDF (Tu diseño original) ---
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');

    doc.setFont("helvetica", "bold");
    doc.setFontSize(16);
    doc.text("REPORTE DE ASISTENCIA AL EVENTO", 148.5, 15, { align: "center" });

    doc.setFontSize(12);
    doc.text(`Evento: ${tituloEvento}`, 20, 25);
    doc.text(`ID: ${idEvento}`, 20, 32);

    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.text("Fecha de reporte: " + new Date().toLocaleString(), 20, 39);
    doc.line(20, 42, 277, 42);

    doc.setFont("helvetica", "bold");
    let y = 50;
    const xDni = 20, xNombre = 45, xInst = 110, xArea = 160, xMod = 210, xFecha = 235;
   
    doc.text("DNI", xDni, y);
    doc.text("Nombres y Apellidos", xNombre, y);
    doc.text("Institución", xInst, y);
    doc.text("Área / Cargo", xArea, y);
    doc.text("Mod.", xMod, y);
    doc.text("Fecha Registro", xFecha, y);
   
    y += 7;
    doc.line(20, y-4, 277, y-4);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(8);

    res.lista.forEach(asist => {
      if (y > 185) {
        doc.addPage('l', 'mm', 'a4');
        y = 20;
      }
     
      doc.text(asist.dni ? asist.dni.toString() : "-", xDni, y);
      doc.text(asist.nombres ? asist.nombres.substring(0, 35) : "-", xNombre, y);
      doc.text(asist.institucion ? asist.institucion.substring(0, 25) : "-", xInst, y);
      doc.text(`${asist.area || ""} / ${asist.cargo || ""}`.substring(0, 50), xArea, y);
      doc.text(asist.modalidad || "-", xMod, y);
      doc.text(asist.fecha || "-", xFecha, y);
     
      y += 8;
      doc.setDrawColor(230);
      doc.line(20, y-4, 277, y-4);
      doc.setDrawColor(0);
    });

    doc.save(`Asistencia_${idEvento}.pdf`);

  } catch (error) {
    console.error("Error al generar PDF:", error);
    alert("Error de conexión al obtener los datos de asistencia.");
    btn.innerText = originalText;
    btn.disabled = false;
  }
}

/**
 * Función que recibe la respuesta de Google One Tap / Button
 */
async function handleCredentialResponse(response) {
    try {
        // 1. Decodificar el email del JWT que envía Google
        const base64Url = response.credential.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const payload = JSON.parse(window.atob(base64));        
        USUARIO_EMAIL = payload.email; // <--- GUARDAMOS EL EMAIL GLOBALMENTE

        console.log("Intentando acceso para:", USUARIO_EMAIL);

        // 2. Consultar al Portero si el usuario existe y qué URL le corresponde
        const res = await fetch(`${URL_PORTERO}?email=${USUARIO_EMAIL}`);
        const config = await res.json();

        if (config.success) {
            // ASIGNACIÓN DINÁMICA DEL BACKEND
            URL_WEB_APP = config.urlBackend; 
            
            // 3. Interfaz: Ocultar login y mostrar aplicación
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            
            // 4. Mostrar feedback del usuario en la barra superior
            if (document.getElementById('user-info')) {
                document.getElementById('user-info').innerText = "👤 " + USUARIO_EMAIL;
            }

            // 5. Cargar los datos iniciales desde el nuevo Backend asignado
            alert("Acceso concedido. Cargando su agenda...");
            cargarDatos(); 

        } else {
            alert("Acceso denegado: " + config.message);
        }
    } catch (e) {
        console.error("Error en flujo de login:", e);
        alert("Error crítico al conectar con el servidor de acceso.");
    }
}
